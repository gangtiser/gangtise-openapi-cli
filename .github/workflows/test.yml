name: Test

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # 20.18.1 = the exact engines floor (undici requirement); 24 = the
        # version publish.yml builds with.
        node-version: ["20.18.1", "24"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # The tarball is the product: install it like a user would and smoke it,
      # so a broken dist/ or a files-list miss fails here instead of post-publish.
      - name: Pack & install smoke test
        if: matrix.node-version == '24'
        run: |
          npm pack
          npm install -g ./gangtise-openapi-cli-*.tgz
          gangtise --help > /dev/null
          test -f "$(npm root -g)/gangtise-openapi-cli/gangtise-openapi/SKILL.md"
