name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify tag matches package version
        # Unconditional: a workflow_dispatch from a branch ref must not publish
        # whatever version happens to be in package.json — dispatch is only a
        # re-run escape hatch and must target a v* tag ref.
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "publish requires a v* tag ref (got $GITHUB_REF); workflow_dispatch must target a tag"
            exit 1
          fi
          node -e "const pkg = require('./package.json'); const expected = 'v' + pkg.version; if (process.env.GITHUB_REF_NAME !== expected) { console.error('Tag ' + process.env.GITHUB_REF_NAME + ' does not match package version ' + expected); process.exit(1) }"

      - run: npm ci

      - run: npm run prepare

      - run: npm test

      - run: npm publish
